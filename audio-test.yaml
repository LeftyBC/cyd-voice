substitutions:
  name: "audio-test"
  friendly_name: "Audio Test"
  version: "0.2.4"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  platformio_options:
    board_build.flash_mode: dio
    board_build.flash_size: 16MB
  on_boot:
    priority: -100
    then:
      - light.turn_on:
          id: backlight
          brightness: 80%
      - output.turn_off: amp_enable
      # Init I2S duplex + ES8311 al boot, lancia mic monitor task
      - lambda: |-
          // I2S duplex
          static i2s_chan_handle_t tx = NULL, rx = NULL;
          i2s_chan_config_t chan_cfg = {};
          chan_cfg.id = I2S_NUM_0;
          chan_cfg.role = I2S_ROLE_MASTER;
          chan_cfg.dma_desc_num = 6;
          chan_cfg.dma_frame_num = 240;
          chan_cfg.auto_clear_after_cb = true;
          esp_err_t err = i2s_new_channel(&chan_cfg, &tx, &rx);
          ESP_LOGW("boot", "I2S duplex: %s", esp_err_to_name(err));

          i2s_std_config_t std_cfg = {};
          std_cfg.clk_cfg.sample_rate_hz = 16000;
          std_cfg.clk_cfg.clk_src = I2S_CLK_SRC_DEFAULT;
          std_cfg.clk_cfg.mclk_multiple = I2S_MCLK_MULTIPLE_256;
          std_cfg.slot_cfg.data_bit_width = I2S_DATA_BIT_WIDTH_16BIT;
          std_cfg.slot_cfg.slot_bit_width = I2S_SLOT_BIT_WIDTH_AUTO;
          std_cfg.slot_cfg.slot_mode = I2S_SLOT_MODE_MONO;
          std_cfg.slot_cfg.slot_mask = I2S_STD_SLOT_LEFT;
          std_cfg.slot_cfg.ws_width = I2S_DATA_BIT_WIDTH_16BIT;
          std_cfg.slot_cfg.ws_pol = false;
          std_cfg.slot_cfg.bit_shift = true;
          std_cfg.gpio_cfg.mclk = GPIO_NUM_4;
          std_cfg.gpio_cfg.bclk = GPIO_NUM_5;
          std_cfg.gpio_cfg.ws = GPIO_NUM_7;
          std_cfg.gpio_cfg.dout = GPIO_NUM_8;
          std_cfg.gpio_cfg.din = GPIO_NUM_6;
          std_cfg.gpio_cfg.invert_flags = {};
          i2s_channel_init_std_mode(tx, &std_cfg);
          i2s_channel_init_std_mode(rx, &std_cfg);
          i2s_channel_enable(tx);
          i2s_channel_enable(rx);

          // ES8311 init via ESPHome I2C device
          auto *c = id(es8311_codec);
          c->write_byte(0x00, 0x1F);
          vTaskDelay(pdMS_TO_TICKS(20));
          c->write_byte(0x00, 0x00);
          vTaskDelay(pdMS_TO_TICKS(10));
          c->write_byte(0x01, 0x3F); c->write_byte(0x02, 0x08);
          c->write_byte(0x03, 0x10); c->write_byte(0x04, 0x10);
          c->write_byte(0x05, 0x00); c->write_byte(0x06, 0x03);
          c->write_byte(0x07, 0x00); c->write_byte(0x08, 0xFF);
          uint8_t r = 0; c->read_byte(0x00, &r);
          c->write_byte(0x00, r & 0xBF);
          c->write_byte(0x09, 0x0C); c->write_byte(0x0A, 0x0C);
          c->write_byte(0x14, 0x1A); c->write_byte(0x16, 0x04); c->write_byte(0x17, 0xC8);
          c->write_byte(0x32, 0xD9);
          c->write_byte(0x0D, 0x01); c->write_byte(0x0E, 0x02);
          c->write_byte(0x12, 0x00); c->write_byte(0x13, 0x10);
          c->write_byte(0x1C, 0x6A); c->write_byte(0x37, 0x08);
          c->write_byte(0x00, 0x80);
          uint8_t reg31 = 0; c->read_byte(0x31, &reg31);
          c->write_byte(0x31, reg31 & ~0x60);
          ESP_LOGW("boot", "ES8311 configured");

          // Store handles in globals
          id(i2s_tx) = (uint32_t)tx;
          id(i2s_rx) = (uint32_t)rx;

          // Collega il custom mic al RX handle
          id(mic_duplex).set_rx_handle(rx);

          // Aggiungi callback per calcolo livello mic
          id(mic_duplex).add_data_callback([](const std::vector<uint8_t> &data) {
            if (id(echo_running)) return;
            const int16_t *samples = (const int16_t *)data.data();
            int num = data.size() / 2;
            int64_t sum = 0;
            for (int i = 0; i < num; i++) sum += (int64_t)samples[i] * samples[i];
            id(mic_level) = (int32_t)sqrt((double)sum / num);
          });

          // Avvia mic + wake word
          id(mic_duplex).start();
          ESP_LOGW("boot", "Duplex mic started");

          // Wake word viene avviato con micro_wake_word.start nell'on_boot
          ESP_LOGW("boot", "Starting wake word...");
      - micro_wake_word.start:

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_SPIRAM_SUPPORT: "y"
      CONFIG_SPIRAM_MODE_OCT: "y"
      CONFIG_SPIRAM_SPEED_80M: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_ESP32S3_INSTRUCTION_CACHE_32KB: "y"

psram:
  mode: octal
  speed: 80MHz

logger:
  level: DEBUG
  logs:
    i2s_audio: DEBUG
    es8311: DEBUG
    speaker: DEBUG
    microphone: DEBUG
    i2c: WARN
    i2c.idf: WARN
    audio_dac: DEBUG
    lvgl: WARN
    component: WARN
    sensor: WARN
    FT63X6: WARN
    touchscreen: WARN

api:

web_server:
  port: 80
  log: true

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  networks:
    - ssid: !secret wifi_ssid
      password: !secret wifi_password
      priority: 10
    - ssid: "GalaxyRagio"
      password: "LaviniaRimini2024"
      priority: 5
  ap:
    ssid: "${name}-fallback"
    password: "fallback123"

captive_portal:

# --- Custom component: duplex microphone ---
external_components:
  - source:
      type: local
      path: custom_components
    components: [duplex_mic]

microphone:
  - platform: duplex_mic
    id: mic_duplex
    sample_rate: 16000
    bits_per_sample: 16
    num_channels: 1

micro_wake_word:
  id: mww
  microphone: mic_duplex
  models:
    - model: okay_nabu
  on_wake_word_detected:
    - lambda: 'ESP_LOGW("wake", ">>> WAKE WORD DETECTED! <<<");'
    - micro_wake_word.stop:
    - script.execute: vad_echo

# --- I2C bus (touch FT6336 + audio codec ES8311) ---
i2c:
  sda: GPIO16
  scl: GPIO15
  scan: true

# --- Audio codec ES8311 ---
audio_dac:
  - platform: es8311
    id: es8311_codec
    address: 0x18
    bits_per_sample: 16bit
    sample_rate: 16000
    mic_gain: 24dB
    use_mclk: true
    use_microphone: true

# --- SPI bus (display ILI9341) ---
spi:
  clk_pin: GPIO12
  mosi_pin: GPIO11
  miso_pin: GPIO13

# I2S bus definito per includere headers, ma non usato direttamente
# Audio gestito manualmente via ESP-IDF raw (duplex necessario per ES8311)
i2s_audio:
  - id: i2s_bus
    i2s_lrclk_pin: GPIO7
    i2s_bclk_pin: GPIO5
    i2s_mclk_pin: GPIO4

# --- Globals ---
globals:
  - id: echo_state
    type: int
    initial_value: "0"
  - id: mic_level
    type: int32_t
    initial_value: "0"
  - id: i2s_tx
    type: uint32_t
    initial_value: "0"
  - id: i2s_rx
    type: uint32_t
    initial_value: "0"
  - id: echo_running
    type: bool
    initial_value: "false"

# --- Time ---
time:
  - platform: sntp
    id: ha_time
    timezone: CET-1CEST,M3.5.0,M10.5.0/3
    servers:
      - it.pool.ntp.org
      - pool.ntp.org
      - time.google.com

# --- Display ILI9341 landscape 320x240 ---
display:
  - platform: ili9xxx
    id: my_display
    model: ili9341
    cs_pin: GPIO10
    dc_pin: GPIO46
    dimensions:
      width: 320
      height: 240
    transform:
      swap_xy: true
    invert_colors: true
    color_order: BGR
    auto_clear_enabled: false
    update_interval: never

# --- Backlight + Amplifier ---
output:
  - platform: ledc
    pin: GPIO45
    id: backlight_output
  - platform: gpio
    pin:
      number: GPIO1
      inverted: true
    id: amp_enable

light:
  - platform: monochromatic
    output: backlight_output
    name: "Display Backlight"
    id: backlight
    restore_mode: ALWAYS_ON
  - platform: esp32_rmt_led_strip
    rgb_order: GRB
    chipset: WS2812
    pin: GPIO42
    num_leds: 1
    name: "Status LED"
    id: status_led
    restore_mode: ALWAYS_ON


# --- Touchscreen FT6336 landscape ---
touchscreen:
  - platform: ft63x6
    id: my_touchscreen
    display: my_display
    interrupt_pin: GPIO17
    reset_pin: GPIO18
    transform:
      swap_xy: true
      mirror_y: true

# --- Fonts ---
font:
  - file: "gfonts://Roboto@500"
    id: font_title
    size: 22
    bpp: 4
  - file: "gfonts://Roboto"
    id: font_body
    size: 16
    bpp: 4
  - file: "gfonts://Roboto@300"
    id: font_small
    size: 13
    bpp: 4

# --- Scripts ---
script:
  # TONO v0.2.0: usa handle I2S globali
  - id: diag_log
    then:
      - lambda: |-
          xTaskCreatePinnedToCore([](void *param) {
            ESP_LOGW("tone", "=== TONO v0.2.0 ===");
            auto tx = (i2s_chan_handle_t)(uint32_t)id(i2s_tx);
            gpio_set_level(GPIO_NUM_1, 0);  // Amp ON
            const int n = 16000 * 2;
            int16_t *tone = (int16_t *)heap_caps_malloc(n * 2, MALLOC_CAP_DEFAULT);
            for (int i = 0; i < n; i++)
              tone[i] = (int16_t)(16000.0f * sinf(2.0f * M_PI * 440.0f * i / 16000.0f));
            size_t bw = 0, tw = 0;
            while (tw < n * 2) {
              i2s_channel_write(tx, (uint8_t*)tone + tw, n * 2 - tw, &bw, pdMS_TO_TICKS(1000));
              tw += bw;
            }
            free(tone);
            vTaskDelay(pdMS_TO_TICKS(300));
            gpio_set_level(GPIO_NUM_1, 1);  // Amp OFF
            ESP_LOGW("tone", "Done");
            vTaskDelete(NULL);
          }, "tone_task", 4096, NULL, 5, NULL, 0);

  # VAD ECHO: registra dopo wake word finche' c'e' voce, poi riproduci
  - id: vad_echo
    then:
      - lambda: |-
          xTaskCreatePinnedToCore([](void *param) {
            ESP_LOGW("vad", "=== VAD ECHO v0.2.3 ===");
            auto tx = (i2s_chan_handle_t)(uint32_t)id(i2s_tx);
            auto rx = (i2s_chan_handle_t)(uint32_t)id(i2s_rx);
            auto *c = id(es8311_codec);

            // Stop mic duplex (libera RX)
            id(echo_running) = true;
            id(mic_duplex).stop();
            vTaskDelay(pdMS_TO_TICKS(200));

            // Amp ON
            gpio_set_level(GPIO_NUM_1, 0);

            // Mute DAC
            uint8_t reg31 = 0;
            c->read_byte(0x31, &reg31);
            c->write_byte(0x31, reg31 | 0x60);

            id(echo_state) = 1;  // recording
            ESP_LOGW("vad", "1. Listening (VAD)...");

            // Buffer in PSRAM (max 10 secondi)
            const size_t max_bytes = 16000 * 2 * 10;
            const size_t chunk = 960;  // 30ms @ 16kHz 16bit mono
            uint8_t *rec_buf = (uint8_t *)heap_caps_malloc(max_bytes, MALLOC_CAP_SPIRAM | MALLOC_CAP_8BIT);
            if (!rec_buf) rec_buf = (uint8_t *)heap_caps_malloc(max_bytes, MALLOC_CAP_DEFAULT);

            size_t total_read = 0;
            const int silence_threshold = 50;
            const int silence_timeout_ms = 1000;  // 1s di silenzio = stop
            const int min_speech_ms = 300;  // almeno 300ms di voce
            uint32_t silence_start = 0;
            bool speech_detected = false;
            bool silence_counting = false;

            if (rec_buf) {
              while (total_read < max_bytes) {
                size_t br = 0;
                esp_err_t err = i2s_channel_read(rx, rec_buf + total_read,
                    std::min(chunk, max_bytes - total_read), &br, pdMS_TO_TICKS(200));
                if (err != ESP_OK || br == 0) continue;

                // Calcola RMS del chunk
                int16_t *samples = (int16_t *)(rec_buf + total_read);
                int num = br / 2;
                int64_t sum = 0;
                for (int i = 0; i < num; i++) sum += (int64_t)samples[i] * samples[i];
                int32_t rms = (int32_t)sqrt((double)sum / num);
                id(mic_level) = rms;

                total_read += br;
                uint32_t elapsed_ms = total_read / 32;  // bytes / (16000*2/1000)

                if (rms > silence_threshold) {
                  // Voce rilevata
                  if (!speech_detected && elapsed_ms > min_speech_ms) {
                    speech_detected = true;
                    ESP_LOGW("vad", "2. Speech detected (rms=%d)", rms);
                  }
                  silence_counting = false;
                } else if (speech_detected) {
                  // Silenzio dopo voce
                  if (!silence_counting) {
                    silence_counting = true;
                    silence_start = millis();
                  } else if ((millis() - silence_start) > silence_timeout_ms) {
                    ESP_LOGW("vad", "3. Silence detected, stopping (total=%d bytes, %dms)", total_read, elapsed_ms);
                    break;
                  }
                }

                // Timeout massimo 10s
                if (elapsed_ms > 10000) {
                  ESP_LOGW("vad", "3. Max duration reached");
                  break;
                }
              }

              ESP_LOGW("vad", "4. Recorded %d bytes (%dms)", total_read, total_read / 32);

              if (total_read > 0) {
                // Unmute DAC
                c->read_byte(0x31, &reg31);
                c->write_byte(0x31, reg31 & ~0x60);
                vTaskDelay(pdMS_TO_TICKS(100));

                id(echo_state) = 2;  // playing
                ESP_LOGW("vad", "5. Playing back...");

                size_t total_written = 0;
                while (total_written < total_read) {
                  size_t bw = 0;
                  i2s_channel_write(tx, rec_buf + total_written,
                      total_read - total_written, &bw, pdMS_TO_TICKS(500));
                  total_written += bw;
                }
                ESP_LOGW("vad", "6. Played %d bytes", total_written);
              }
              free(rec_buf);
            }

            vTaskDelay(pdMS_TO_TICKS(500));
            gpio_set_level(GPIO_NUM_1, 1);
            id(echo_state) = 3;
            id(echo_running) = false;

            // Riavvia mic duplex + wake word
            id(mic_duplex).start();
            ESP_LOGW("vad", "7. Done, restarting wake word");
            vTaskDelete(NULL);
          }, "vad_task", 8192, NULL, 5, NULL, 0);
      # Riavvia wake word (dal main loop, dopo che il task e' partito)
      - delay: 500ms
      - micro_wake_word.start:

  # ECHO manuale: registra 3s fissi
  - id: echo_test_raw
    then:
      - lambda: |-
          xTaskCreatePinnedToCore([](void *param) {
            ESP_LOGW("echo", "=== ECHO v0.2.1 ===");
            auto tx = (i2s_chan_handle_t)(uint32_t)id(i2s_tx);
            auto rx = (i2s_chan_handle_t)(uint32_t)id(i2s_rx);
            auto *c = id(es8311_codec);

            // Stop mic duplex e attendi che rilasci il canale RX
            id(echo_running) = true;
            id(mic_duplex).stop();
            vTaskDelay(pdMS_TO_TICKS(200));

            // Amp ON
            gpio_set_level(GPIO_NUM_1, 0);

            // Mute DAC
            uint8_t reg31 = 0;
            c->read_byte(0x31, &reg31);
            c->write_byte(0x31, reg31 | 0x60);

            id(echo_state) = 1;
            ESP_LOGW("echo", "1. Recording 3s...");

            const size_t rec_bytes = 16000 * 2 * 3;
            uint8_t *rec_buf = (uint8_t *)heap_caps_malloc(rec_bytes, MALLOC_CAP_SPIRAM | MALLOC_CAP_8BIT);
            if (!rec_buf) rec_buf = (uint8_t *)heap_caps_malloc(rec_bytes, MALLOC_CAP_DEFAULT);

            if (rec_buf) {
              size_t total_read = 0;
              while (total_read < rec_bytes) {
                size_t br = 0;
                i2s_channel_read(rx, rec_buf + total_read, rec_bytes - total_read, &br, pdMS_TO_TICKS(500));
                total_read += br;
              }
              ESP_LOGW("echo", "2. Recorded %d bytes", total_read);

              // Unmute DAC
              c->read_byte(0x31, &reg31);
              c->write_byte(0x31, reg31 & ~0x60);
              vTaskDelay(pdMS_TO_TICKS(100));

              id(echo_state) = 2;
              ESP_LOGW("echo", "3. Playing back...");

              size_t total_written = 0;
              while (total_written < rec_bytes) {
                size_t bw = 0;
                i2s_channel_write(tx, rec_buf + total_written, rec_bytes - total_written, &bw, pdMS_TO_TICKS(500));
                total_written += bw;
              }
              ESP_LOGW("echo", "4. Played %d bytes", total_written);
              free(rec_buf);
            }

            vTaskDelay(pdMS_TO_TICKS(500));
            gpio_set_level(GPIO_NUM_1, 1);
            id(echo_state) = 3;
            id(echo_running) = false;
            // Riavvia mic duplex + wake word
            id(mic_duplex).start();
            // Non posso chiamare micro_wake_word.start da task, setto flag

            ESP_LOGW("echo", "5. Done");
            vTaskDelete(NULL);
          }, "echo_task", 8192, NULL, 5, NULL, 0);


# --- LVGL ---
lvgl:
  displays:
    - my_display
  touchscreens:
    - my_touchscreen
  color_depth: 16
  buffer_size: 25%
  disp_bg_color: 0x000000
  disp_bg_opa: COVER
  default_font: font_body

  widgets:
    - obj:
        width: 320
        height: 240
        bg_color: 0x000000
        bg_opa: COVER
        border_width: 0
        pad_all: 12
        layout:
          type: FLEX
          flex_flow: COLUMN
          flex_align_main: CENTER
          flex_align_cross: CENTER
          pad_row: 10
        widgets:
          # Riga info: IP + orario
          - obj:
              width: 296
              height: 24
              bg_opa: TRANSP
              border_width: 0
              pad_all: 0
              layout:
                type: FLEX
                flex_flow: ROW
                flex_align_main: SPACE_BETWEEN
                flex_align_cross: CENTER
              widgets:
                - label:
                    id: lbl_ip
                    text: "..."
                    text_font: font_small
                    text_color: 0x6F6F6F
                - label:
                    text: "v${version}"
                    text_font: font_small
                    text_color: 0x4A4A4A
                - label:
                    id: lbl_clock
                    text: "--:--"
                    text_font: font_small
                    text_color: 0x6F6F6F
          # Riga pulsanti: TONO + ECHO
          - obj:
              width: 296
              height: 110
              bg_opa: TRANSP
              border_width: 0
              pad_all: 0
              layout:
                type: FLEX
                flex_flow: ROW
                flex_align_main: SPACE_EVENLY
                flex_align_cross: CENTER
              widgets:
                # Pulsante TONO (solo speaker)
                - obj:
                    id: tone_circle
                    width: 100
                    height: 100
                    radius: 0x7FFF
                    bg_color: 0x0B56FC
                    bg_opa: COVER
                    border_width: 0
                    clickable: true
                    on_click:
                      then:
                        - script.execute: diag_log
                    widgets:
                      - label:
                          align: CENTER
                          text: "TONO"
                          text_font: font_body
                          text_color: 0xFFFFFF
                          text_align: CENTER
                # Pulsante ECHO (mic + speaker)
                - obj:
                    id: echo_circle
                    width: 100
                    height: 100
                    radius: 0x7FFF
                    bg_color: 0x00CC00
                    bg_opa: COVER
                    border_width: 0
                    clickable: true
                    on_click:
                      then:
                        - script.execute: echo_test_raw
                    widgets:
                      - label:
                          align: CENTER
                          text: "ECHO"
                          text_font: font_body
                          text_color: 0xFFFFFF
                          text_align: CENTER
          # Label stato
          - label:
              id: lbl_status
              text: "PRONTO"
              text_font: font_body
              text_color: 0x6F6F6F
          # Label dettaglio
          - label:
              id: lbl_detail
              text: "TONO: test speaker | ECHO: mic+speaker"
              text_font: font_small
              text_color: 0x4A4A4A
              long_mode: DOT
              width: 296
              text_align: CENTER

# --- Clock + IP update ---
interval:
  - interval: 1s
    then:
      - lvgl.label.update:
          id: lbl_clock
          text: !lambda |-
            if (id(ha_time).now().is_valid()) {
              return id(ha_time).now().strftime("%H:%M");
            }
            return std::string("--:--");
      - lvgl.label.update:
          id: lbl_ip
          text: !lambda |-
            if (id(ip_addr).has_state()) {
              return id(ip_addr).state;
            }
            return std::string("...");
  - interval: 200ms
    then:
      - lambda: |-
          // Aggiorna livello mic + stato echo
          static int last_state = -1;
          int state = id(echo_state);
          int level = id(mic_level);

          // Aggiorna label dettaglio con livello
          char buf[48];
          snprintf(buf, sizeof(buf), "Mic: %d", level);
          lv_label_set_text(id(lbl_detail), buf);

          // Colore cerchio echo: verde idle, giallo voice, rosso recording
          if (state == 1) {
            lv_obj_set_style_bg_color(id(echo_circle), lv_color_hex(0xFF0000), 0);
          } else if (level > 2000) {
            lv_obj_set_style_bg_color(id(echo_circle), lv_color_hex(0xFFC107), 0);
          } else {
            lv_obj_set_style_bg_color(id(echo_circle), lv_color_hex(0x00CC00), 0);
          }

          // Stato echo script
          if (state != last_state) {
            last_state = state;
            if (state == 1) {
              lv_label_set_text(id(lbl_status), "REGISTRAZIONE...");
              lv_obj_set_style_text_color(id(lbl_status), lv_color_hex(0xFF0000), 0);
            } else if (state == 2) {
              lv_label_set_text(id(lbl_status), "RIPRODUZIONE...");
              lv_obj_set_style_text_color(id(lbl_status), lv_color_hex(0x00CC00), 0);
            } else if (state == 3) {
              lv_label_set_text(id(lbl_status), "PRONTO");
              lv_obj_set_style_text_color(id(lbl_status), lv_color_hex(0x6F6F6F), 0);
              id(echo_state) = 0;
              last_state = 0;
            }
          }

