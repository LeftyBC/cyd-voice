substitutions:
  name: "voice-test"
  friendly_name: "Voice Test"
  version: "0.4.2"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  platformio_options:
    board_build.flash_mode: dio
    board_build.flash_size: 16MB
  on_boot:
    priority: -100
    then:
      - light.turn_on:
          id: backlight
          brightness: 80%
      - output.turn_off: amp_enable
      # Init I2S duplex + ES8311 al boot
      - lambda: |-
          // I2S duplex
          static i2s_chan_handle_t tx = NULL, rx = NULL;
          i2s_chan_config_t chan_cfg = {};
          chan_cfg.id = I2S_NUM_0;
          chan_cfg.role = I2S_ROLE_MASTER;
          chan_cfg.dma_desc_num = 6;
          chan_cfg.dma_frame_num = 240;
          chan_cfg.auto_clear_after_cb = true;
          i2s_new_channel(&chan_cfg, &tx, &rx);

          i2s_std_config_t std_cfg = {};
          std_cfg.clk_cfg.sample_rate_hz = 16000;
          std_cfg.clk_cfg.clk_src = I2S_CLK_SRC_DEFAULT;
          std_cfg.clk_cfg.mclk_multiple = I2S_MCLK_MULTIPLE_256;
          std_cfg.slot_cfg.data_bit_width = I2S_DATA_BIT_WIDTH_16BIT;
          std_cfg.slot_cfg.slot_bit_width = I2S_SLOT_BIT_WIDTH_AUTO;
          std_cfg.slot_cfg.slot_mode = I2S_SLOT_MODE_MONO;
          std_cfg.slot_cfg.slot_mask = I2S_STD_SLOT_LEFT;
          std_cfg.slot_cfg.ws_width = I2S_DATA_BIT_WIDTH_16BIT;
          std_cfg.slot_cfg.ws_pol = false;
          std_cfg.slot_cfg.bit_shift = true;
          std_cfg.gpio_cfg.mclk = GPIO_NUM_4;
          std_cfg.gpio_cfg.bclk = GPIO_NUM_5;
          std_cfg.gpio_cfg.ws = GPIO_NUM_7;
          std_cfg.gpio_cfg.dout = GPIO_NUM_8;
          std_cfg.gpio_cfg.din = GPIO_NUM_6;
          std_cfg.gpio_cfg.invert_flags = {};
          i2s_channel_init_std_mode(tx, &std_cfg);
          i2s_channel_init_std_mode(rx, &std_cfg);
          i2s_channel_enable(tx);
          i2s_channel_enable(rx);

          // ES8311 init
          auto *c = id(es8311_codec);
          c->write_byte(0x00, 0x1F);
          vTaskDelay(pdMS_TO_TICKS(20));
          c->write_byte(0x00, 0x00);
          vTaskDelay(pdMS_TO_TICKS(10));
          c->write_byte(0x01, 0x3F); c->write_byte(0x02, 0x08);
          c->write_byte(0x03, 0x10); c->write_byte(0x04, 0x10);
          c->write_byte(0x05, 0x00); c->write_byte(0x06, 0x03);
          c->write_byte(0x07, 0x00); c->write_byte(0x08, 0xFF);
          uint8_t r = 0; c->read_byte(0x00, &r);
          c->write_byte(0x00, r & 0xBF);
          c->write_byte(0x09, 0x0C); c->write_byte(0x0A, 0x0C);
          c->write_byte(0x14, 0x1A); c->write_byte(0x16, 0x04); c->write_byte(0x17, 0xC8);
          c->write_byte(0x32, 0xD9);
          c->write_byte(0x0D, 0x01); c->write_byte(0x0E, 0x02);
          c->write_byte(0x12, 0x00); c->write_byte(0x13, 0x10);
          c->write_byte(0x1C, 0x6A); c->write_byte(0x37, 0x08);
          c->write_byte(0x00, 0x80);
          uint8_t reg31 = 0; c->read_byte(0x31, &reg31);
          c->write_byte(0x31, reg31 & ~0x60);
          ESP_LOGW("boot", "I2S duplex + ES8311 OK");

          // Store handles
          id(i2s_tx) = (uint32_t)tx;
          id(i2s_rx) = (uint32_t)rx;

          // Collega custom components
          id(mic_duplex).set_rx_handle(rx);
          id(spk_duplex).set_tx_handle(tx);

          // Callback livello mic
          id(mic_duplex).add_data_callback([](const std::vector<uint8_t> &data) {
            if (id(echo_running)) return;
            const int16_t *samples = (const int16_t *)data.data();
            int num = data.size() / 2;
            int64_t sum = 0;
            for (int i = 0; i < num; i++) sum += (int64_t)samples[i] * samples[i];
            id(mic_level) = (int32_t)sqrt((double)sum / num);
          });

          // Avvia mic
          id(mic_duplex).start();
          ESP_LOGW("boot", "Ready, waiting for HA connection...");

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_SPIRAM_SUPPORT: "y"
      CONFIG_SPIRAM_MODE_OCT: "y"
      CONFIG_SPIRAM_SPEED_80M: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_ESP32S3_INSTRUCTION_CACHE_32KB: "y"

psram:
  mode: octal
  speed: 80MHz

logger:
  level: DEBUG
  logs:
    i2c: WARN
    i2c.idf: WARN
    lvgl: WARN
    component: WARN
    sensor: WARN
    FT63X6: WARN
    touchscreen: WARN

api:
  encryption:
    key: !secret api_encryption_key

web_server:
  port: 80
  log: true

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  networks:
    - ssid: !secret wifi_ssid
      password: !secret wifi_password
      priority: 10
    - ssid: "GalaxyRagio"
      password: "LaviniaRimini2024"
      priority: 5
  ap:
    ssid: "${name}-fallback"
    password: "fallback123"

captive_portal:

# --- Custom components ---
external_components:
  - source:
      type: local
      path: custom_components
    components: [duplex_mic, duplex_speaker]

microphone:
  - platform: duplex_mic
    id: mic_duplex
    sample_rate: 16000
    bits_per_sample: 16
    num_channels: 1

speaker:
  - platform: duplex_speaker
    id: spk_duplex
    sample_rate: 16000
    bits_per_sample: 16
    num_channels: 1

micro_wake_word:
  id: mww
  microphone: mic_duplex
  models:
    - model: okay_nabu
  on_wake_word_detected:
    - lambda: 'ESP_LOGW("wake", ">>> WAKE WORD DETECTED! <<<");'
    - micro_wake_word.stop:
    - delay: 300ms
    - lambda: |-
        id(va).set_use_wake_word(false);
    - voice_assistant.start:
        wake_word: !lambda return wake_word;

voice_assistant:
  id: va
  microphone: mic_duplex
  speaker: spk_duplex
  micro_wake_word: mww
  noise_suppression_level: 2
  auto_gain: 31dBFS
  volume_multiplier: 2.0
  on_listening:
    - lambda: |-
        id(echo_state) = 1;
        ESP_LOGW("va", "Listening...");
  on_stt_vad_end:
    - lambda: 'ESP_LOGW("va", "Processing...");'
  on_stt_end:
    - lambda: 'ESP_LOGW("va", "STT: %s", x.c_str());'
  on_tts_start:
    - lambda: |-
        id(echo_state) = 2;
        ESP_LOGW("va", "TTS: %s", x.c_str());
  on_tts_end:
    - lambda: 'ESP_LOGW("va", "TTS audio received");'
  on_end:
    - lambda: |-
        id(echo_state) = 3;
        ESP_LOGW("va", "Done");
    - micro_wake_word.start:
  on_error:
    - lambda: |-
        ESP_LOGE("va", "Error: %s", code.c_str());
        id(echo_state) = 3;
    - micro_wake_word.start:
  on_client_connected:
    - lambda: 'ESP_LOGW("va", "HA connected");'
    - micro_wake_word.start:
  on_client_disconnected:
    - lambda: 'ESP_LOGW("va", "HA disconnected");'

# --- I2C bus ---
i2c:
  sda: GPIO16
  scl: GPIO15
  scan: true

# --- Audio codec ES8311 (per I2C access, init manuale) ---
audio_dac:
  - platform: es8311
    id: es8311_codec
    address: 0x18
    bits_per_sample: 16bit
    sample_rate: 16000
    mic_gain: 24dB
    use_mclk: true
    use_microphone: true

# --- SPI bus ---
spi:
  clk_pin: GPIO12
  mosi_pin: GPIO11
  miso_pin: GPIO13

# --- I2S (per headers) ---
i2s_audio:
  - id: i2s_bus
    i2s_lrclk_pin: GPIO7
    i2s_bclk_pin: GPIO5
    i2s_mclk_pin: GPIO4

# --- Globals ---
globals:
  - id: echo_state
    type: int
    initial_value: "0"
  - id: mic_level
    type: int32_t
    initial_value: "0"
  - id: i2s_tx
    type: uint32_t
    initial_value: "0"
  - id: i2s_rx
    type: uint32_t
    initial_value: "0"
  - id: echo_running
    type: bool
    initial_value: "false"

# --- Time ---
time:
  - platform: sntp
    id: ha_time
    timezone: CET-1CEST,M3.5.0,M10.5.0/3
    servers:
      - it.pool.ntp.org
      - pool.ntp.org
      - time.google.com

# --- Display ---
display:
  - platform: ili9xxx
    id: my_display
    model: ili9341
    cs_pin: GPIO10
    dc_pin: GPIO46
    dimensions:
      width: 320
      height: 240
    transform:
      swap_xy: true
    invert_colors: true
    color_order: BGR
    auto_clear_enabled: false
    update_interval: never

# --- Backlight + Amplifier ---
output:
  - platform: ledc
    pin: GPIO45
    id: backlight_output
  - platform: gpio
    pin:
      number: GPIO1
      inverted: true
    id: amp_enable

light:
  - platform: monochromatic
    output: backlight_output
    name: "Display Backlight"
    id: backlight
    restore_mode: ALWAYS_ON
  - platform: esp32_rmt_led_strip
    rgb_order: GRB
    chipset: WS2812
    pin: GPIO42
    num_leds: 1
    name: "Status LED"
    id: status_led
    restore_mode: ALWAYS_ON

# --- Touchscreen ---
touchscreen:
  - platform: ft63x6
    id: my_touchscreen
    display: my_display
    interrupt_pin: GPIO17
    reset_pin: GPIO18
    transform:
      swap_xy: true
      mirror_y: true

# --- Fonts ---
font:
  - file: "gfonts://Roboto@500"
    id: font_title
    size: 22
    bpp: 4
  - file: "gfonts://Roboto"
    id: font_body
    size: 16
    bpp: 4
  - file: "gfonts://Roboto@300"
    id: font_small
    size: 13
    bpp: 4

# --- Scripts ---
script:
  # VAD ECHO: registra con VAD, riproduci via custom speaker
  - id: vad_echo
    then:
      - lambda: |-
          xTaskCreatePinnedToCore([](void *param) {
            ESP_LOGW("vad", "=== VAD ECHO v0.4.0 ===");
            auto rx = (i2s_chan_handle_t)(uint32_t)id(i2s_rx);
            auto *c = id(es8311_codec);

            // Stop mic duplex (libera RX)
            id(echo_running) = true;
            id(mic_duplex).stop();
            vTaskDelay(pdMS_TO_TICKS(200));

            // Mute DAC
            uint8_t reg31 = 0;
            c->read_byte(0x31, &reg31);
            c->write_byte(0x31, reg31 | 0x60);

            id(echo_state) = 1;
            ESP_LOGW("vad", "1. Listening (VAD)...");

            // Buffer PSRAM (max 10s)
            const size_t max_bytes = 16000 * 2 * 10;
            const size_t chunk = 960;
            uint8_t *rec_buf = (uint8_t *)heap_caps_malloc(max_bytes, MALLOC_CAP_SPIRAM | MALLOC_CAP_8BIT);
            if (!rec_buf) rec_buf = (uint8_t *)heap_caps_malloc(max_bytes, MALLOC_CAP_DEFAULT);

            size_t total_read = 0;
            const int silence_threshold = 50;
            const int silence_timeout_ms = 1000;
            const int min_speech_ms = 300;
            uint32_t silence_start = 0;
            bool speech_detected = false;
            bool silence_counting = false;

            if (rec_buf) {
              while (total_read < max_bytes) {
                size_t br = 0;
                esp_err_t err = i2s_channel_read(rx, rec_buf + total_read,
                    std::min(chunk, max_bytes - total_read), &br, pdMS_TO_TICKS(200));
                if (err != ESP_OK || br == 0) continue;

                int16_t *samples = (int16_t *)(rec_buf + total_read);
                int num = br / 2;
                int64_t sum = 0;
                for (int i = 0; i < num; i++) sum += (int64_t)samples[i] * samples[i];
                int32_t rms = (int32_t)sqrt((double)sum / num);
                id(mic_level) = rms;

                total_read += br;
                uint32_t elapsed_ms = total_read / 32;

                if (rms > silence_threshold) {
                  if (!speech_detected && elapsed_ms > min_speech_ms) {
                    speech_detected = true;
                    ESP_LOGW("vad", "2. Speech detected (rms=%d)", rms);
                  }
                  silence_counting = false;
                } else if (speech_detected) {
                  if (!silence_counting) {
                    silence_counting = true;
                    silence_start = millis();
                  } else if ((millis() - silence_start) > silence_timeout_ms) {
                    ESP_LOGW("vad", "3. Silence detected (%dms)", elapsed_ms);
                    break;
                  }
                }
                if (elapsed_ms > 10000) {
                  ESP_LOGW("vad", "3. Max duration reached");
                  break;
                }
              }

              ESP_LOGW("vad", "4. Recorded %d bytes (%dms)", total_read, total_read / 32);

              if (total_read > 0) {
                // Unmute DAC
                c->read_byte(0x31, &reg31);
                c->write_byte(0x31, reg31 & ~0x60);
                vTaskDelay(pdMS_TO_TICKS(100));

                id(echo_state) = 2;
                ESP_LOGW("vad", "5. Playing...");

                size_t sent = 0;
                while (sent < total_read) {
                  size_t to_send = std::min((size_t)4096, total_read - sent);
                  size_t written = id(spk_duplex).play(rec_buf + sent, to_send, pdMS_TO_TICKS(500));
                  sent += written;
                }
                while (id(spk_duplex).has_buffered_data()) {
                  vTaskDelay(pdMS_TO_TICKS(50));
                }
                vTaskDelay(pdMS_TO_TICKS(300));
                id(spk_duplex).stop();
              }
              free(rec_buf);
            }

            id(echo_state) = 3;
            id(echo_running) = false;
            ESP_LOGW("vad", "6. Done");
            vTaskDelete(NULL);
          }, "vad_task", 8192, NULL, 5, NULL, 0);
      - delay: 8s
      - micro_wake_word.start:

  # ECHO manuale: registra 3s fissi
  - id: echo_manual
    then:
      - lambda: |-
          xTaskCreatePinnedToCore([](void *param) {
            ESP_LOGW("echo", "=== ECHO v0.4.0 ===");
            auto rx = (i2s_chan_handle_t)(uint32_t)id(i2s_rx);
            auto *c = id(es8311_codec);

            id(echo_running) = true;
            id(mic_duplex).stop();
            vTaskDelay(pdMS_TO_TICKS(200));

            uint8_t reg31 = 0;
            c->read_byte(0x31, &reg31);
            c->write_byte(0x31, reg31 | 0x60);

            id(echo_state) = 1;
            ESP_LOGW("echo", "1. Recording 3s...");

            const size_t rec_bytes = 16000 * 2 * 3;
            uint8_t *rec_buf = (uint8_t *)heap_caps_malloc(rec_bytes, MALLOC_CAP_SPIRAM | MALLOC_CAP_8BIT);
            if (!rec_buf) rec_buf = (uint8_t *)heap_caps_malloc(rec_bytes, MALLOC_CAP_DEFAULT);

            if (rec_buf) {
              size_t total_read = 0;
              while (total_read < rec_bytes) {
                size_t br = 0;
                i2s_channel_read(rx, rec_buf + total_read, rec_bytes - total_read, &br, pdMS_TO_TICKS(500));
                total_read += br;
              }

              c->read_byte(0x31, &reg31);
              c->write_byte(0x31, reg31 & ~0x60);
              vTaskDelay(pdMS_TO_TICKS(100));

              id(echo_state) = 2;
              ESP_LOGW("echo", "2. Playing...");

              size_t sent = 0;
              while (sent < total_read) {
                size_t to_send = std::min((size_t)4096, total_read - sent);
                size_t written = id(spk_duplex).play(rec_buf + sent, to_send, pdMS_TO_TICKS(500));
                sent += written;
              }
              while (id(spk_duplex).has_buffered_data()) {
                vTaskDelay(pdMS_TO_TICKS(50));
              }
              vTaskDelay(pdMS_TO_TICKS(300));
              id(spk_duplex).stop();
              free(rec_buf);
            }

            id(echo_state) = 3;
            id(echo_running) = false;
            ESP_LOGW("echo", "3. Done");
            vTaskDelete(NULL);
          }, "echo_task", 8192, NULL, 5, NULL, 0);

# --- LVGL ---
lvgl:
  displays:
    - my_display
  touchscreens:
    - my_touchscreen
  color_depth: 16
  buffer_size: 25%
  disp_bg_color: 0x000000
  disp_bg_opa: COVER
  default_font: font_body

  widgets:
    - obj:
        width: 320
        height: 240
        bg_color: 0x000000
        bg_opa: COVER
        border_width: 0
        pad_all: 12
        layout:
          type: FLEX
          flex_flow: COLUMN
          flex_align_main: CENTER
          flex_align_cross: CENTER
          pad_row: 10
        widgets:
          # Riga info: IP + versione + orario
          - obj:
              width: 296
              height: 24
              bg_opa: TRANSP
              border_width: 0
              pad_all: 0
              layout:
                type: FLEX
                flex_flow: ROW
                flex_align_main: SPACE_BETWEEN
                flex_align_cross: CENTER
              widgets:
                - label:
                    id: lbl_ip
                    text: "..."
                    text_font: font_small
                    text_color: 0x6F6F6F
                - label:
                    text: "v${version}"
                    text_font: font_small
                    text_color: 0x4A4A4A
                - label:
                    id: lbl_clock
                    text: "--:--"
                    text_font: font_small
                    text_color: 0x6F6F6F
          # Pulsante ECHO centrale
          - obj:
              id: echo_circle
              width: 120
              height: 120
              radius: 0x7FFF
              bg_color: 0x0B56FC
              bg_opa: COVER
              border_width: 0
              clickable: true
              on_click:
                then:
                  - script.execute: echo_manual
              widgets:
                - label:
                    align: CENTER
                    text: "ECHO"
                    text_font: font_title
                    text_color: 0xFFFFFF
                    text_align: CENTER
          # Label stato
          - label:
              id: lbl_status
              text: "PRONTO"
              text_font: font_body
              text_color: 0x0B56FC
          # Label dettaglio
          - label:
              id: lbl_detail
              text: "Okay Nabu per attivare"
              text_font: font_small
              text_color: 0x4A4A4A
              long_mode: DOT
              width: 296
              text_align: CENTER

# --- Clock + UI update ---
interval:
  - interval: 1s
    then:
      - lvgl.label.update:
          id: lbl_clock
          text: !lambda |-
            if (id(ha_time).now().is_valid()) {
              return id(ha_time).now().strftime("%H:%M");
            }
            return std::string("--:--");
      - lvgl.label.update:
          id: lbl_ip
          text: !lambda |-
            if (id(ip_addr).has_state()) {
              return id(ip_addr).state;
            }
            return std::string("...");
  - interval: 200ms
    then:
      - lambda: |-
          static int last_state = -1;
          int state = id(echo_state);
          int level = id(mic_level);

          // Livello mic
          char buf[48];
          snprintf(buf, sizeof(buf), "Mic: %d", level);
          lv_label_set_text(id(lbl_detail), buf);

          // Stato UI: 0=idle, 1=recording, 2=playing, 3=done
          if (state != last_state) {
            last_state = state;
            if (state == 0) {
              // PRONTO = BLU
              lv_obj_set_style_bg_color(id(echo_circle), lv_color_hex(0x0B56FC), 0);
              lv_label_set_text(id(lbl_status), "PRONTO");
              lv_obj_set_style_text_color(id(lbl_status), lv_color_hex(0x0B56FC), 0);
            } else if (state == 1) {
              // REGISTRAZIONE = ROSSO
              lv_obj_set_style_bg_color(id(echo_circle), lv_color_hex(0xFF0000), 0);
              lv_label_set_text(id(lbl_status), "REGISTRAZIONE...");
              lv_obj_set_style_text_color(id(lbl_status), lv_color_hex(0xFF0000), 0);
            } else if (state == 2) {
              // RIPRODUZIONE = VERDE
              lv_obj_set_style_bg_color(id(echo_circle), lv_color_hex(0x00CC00), 0);
              lv_label_set_text(id(lbl_status), "RIPRODUZIONE...");
              lv_obj_set_style_text_color(id(lbl_status), lv_color_hex(0x00CC00), 0);
            } else if (state == 3) {
              // Done -> torna a PRONTO
              lv_obj_set_style_bg_color(id(echo_circle), lv_color_hex(0x0B56FC), 0);
              lv_label_set_text(id(lbl_status), "PRONTO");
              lv_obj_set_style_text_color(id(lbl_status), lv_color_hex(0x0B56FC), 0);
              id(echo_state) = 0;
              last_state = 0;
            }
          }

# --- Sensors ---
text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
      id: ip_addr
    ssid:
      name: "Connected SSID"
    mac_address:
      name: "MAC Address"

sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 30s

button:
  - platform: restart
    name: "Restart"
