number:
  - platform: template
    name: "Display Timeout"
    id: display_timeout
    icon: mdi:timer-outline
    min_value: 0
    max_value: 300
    step: 5
    initial_value: 60
    optimistic: true
    restore_value: true
    unit_of_measurement: "s"
    entity_category: config

  - platform: template
    name: "Clock Return Timeout"
    id: clock_return_timeout
    icon: mdi:clock-outline
    min_value: 0
    max_value: 120
    step: 5
    initial_value: 30
    optimistic: true
    restore_value: true
    unit_of_measurement: "s"
    entity_category: config

  - platform: template
    name: "Volume"
    id: volume_ctrl
    icon: mdi:volume-high
    min_value: 0
    max_value: 100
    step: 5
    initial_value: 75
    optimistic: true
    restore_value: true
    set_action:
      - lambda: |-
          uint8_t reg_val = (uint8_t)(x * 2.55f);
          id(es8311_codec).write_byte(0x32, reg_val);
          ESP_LOGW("vol", "Volume set to %.0f%% (reg=0x%02X)", x, reg_val);

