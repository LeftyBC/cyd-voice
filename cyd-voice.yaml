substitutions:
  name: "cyd-voice"
  friendly_name: "CYD Voice"
  version: "1.0.1-beta"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  platformio_options:
    board_build.flash_mode: dio
    board_build.flash_size: 16MB
  on_boot:
    priority: -100
    then:
      - light.turn_on:
          id: backlight
          brightness: 80%
      - output.turn_off: amp_enable
      # I2S duplex + ES8311 init
      - lambda: |-
          static i2s_chan_handle_t tx = NULL, rx = NULL;
          i2s_chan_config_t chan_cfg = {};
          chan_cfg.id = I2S_NUM_0;
          chan_cfg.role = I2S_ROLE_MASTER;
          chan_cfg.dma_desc_num = 6;
          chan_cfg.dma_frame_num = 240;
          chan_cfg.auto_clear_after_cb = true;
          i2s_new_channel(&chan_cfg, &tx, &rx);

          i2s_std_config_t std_cfg = {};
          std_cfg.clk_cfg.sample_rate_hz = 16000;
          std_cfg.clk_cfg.clk_src = I2S_CLK_SRC_DEFAULT;
          std_cfg.clk_cfg.mclk_multiple = I2S_MCLK_MULTIPLE_256;
          std_cfg.slot_cfg.data_bit_width = I2S_DATA_BIT_WIDTH_16BIT;
          std_cfg.slot_cfg.slot_bit_width = I2S_SLOT_BIT_WIDTH_AUTO;
          std_cfg.slot_cfg.slot_mode = I2S_SLOT_MODE_MONO;
          std_cfg.slot_cfg.slot_mask = I2S_STD_SLOT_LEFT;
          std_cfg.slot_cfg.ws_width = I2S_DATA_BIT_WIDTH_16BIT;
          std_cfg.slot_cfg.ws_pol = false;
          std_cfg.slot_cfg.bit_shift = true;
          std_cfg.gpio_cfg.mclk = GPIO_NUM_4;
          std_cfg.gpio_cfg.bclk = GPIO_NUM_5;
          std_cfg.gpio_cfg.ws = GPIO_NUM_7;
          std_cfg.gpio_cfg.dout = GPIO_NUM_8;
          std_cfg.gpio_cfg.din = GPIO_NUM_6;
          std_cfg.gpio_cfg.invert_flags = {};
          i2s_channel_init_std_mode(tx, &std_cfg);
          i2s_channel_init_std_mode(rx, &std_cfg);
          i2s_channel_enable(tx);
          i2s_channel_enable(rx);

          auto *c = id(es8311_codec);
          c->write_byte(0x00, 0x1F);
          vTaskDelay(pdMS_TO_TICKS(20));
          c->write_byte(0x00, 0x00);
          vTaskDelay(pdMS_TO_TICKS(10));
          c->write_byte(0x01, 0x3F); c->write_byte(0x02, 0x08);
          c->write_byte(0x03, 0x10); c->write_byte(0x04, 0x10);
          c->write_byte(0x05, 0x00); c->write_byte(0x06, 0x03);
          c->write_byte(0x07, 0x00); c->write_byte(0x08, 0xFF);
          uint8_t r = 0; c->read_byte(0x00, &r);
          c->write_byte(0x00, r & 0xBF);
          c->write_byte(0x09, 0x0C); c->write_byte(0x0A, 0x0C);
          c->write_byte(0x14, 0x1A); c->write_byte(0x16, 0x04); c->write_byte(0x17, 0xC8);
          c->write_byte(0x32, 0xBF);  // 75%
          c->write_byte(0x0D, 0x01); c->write_byte(0x0E, 0x02);
          c->write_byte(0x12, 0x00); c->write_byte(0x13, 0x10);
          c->write_byte(0x1C, 0x6A); c->write_byte(0x37, 0x08);
          c->write_byte(0x00, 0x80);
          uint8_t reg31 = 0; c->read_byte(0x31, &reg31);
          c->write_byte(0x31, reg31 & ~0x60);

          id(i2s_tx) = (uint32_t)tx;
          id(i2s_rx) = (uint32_t)rx;
          id(mic_duplex).set_rx_handle(rx);
          id(spk_duplex).set_tx_handle(tx);

          id(mic_duplex).start();
          id(last_activity) = millis();
          ESP_LOGW("boot", "CYD Voice ready");
      - delay: 2s
      - script.execute: update_buttons

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_SPIRAM_SUPPORT: "y"
      CONFIG_SPIRAM_MODE_OCT: "y"
      CONFIG_SPIRAM_SPEED_80M: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_ESP32S3_INSTRUCTION_CACHE_32KB: "y"

psram:
  mode: octal
  speed: 80MHz

logger:
  level: DEBUG
  logs:
    i2c: WARN
    i2c.idf: WARN
    lvgl: WARN
    component: WARN
    sensor: WARN
    FT63X6: WARN
    touchscreen: WARN
    voice_assistant: WARN

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  networks:
    - ssid: !secret wifi_ssid
      password: !secret wifi_password
      priority: 10
    - ssid: !secret wifi_ssid_2
      password: !secret wifi_password_2
      priority: 5
  ap:
    ssid: "${name}-fallback"
    password: "fallback123"

captive_portal:

# --- Custom components ---
external_components:
  - source:
      type: local
      path: custom_components
    components: [duplex_mic, duplex_speaker]

microphone:
  - platform: duplex_mic
    id: mic_duplex
    sample_rate: 16000
    bits_per_sample: 16
    num_channels: 1

speaker:
  - platform: duplex_speaker
    id: spk_duplex
    sample_rate: 16000
    bits_per_sample: 16
    num_channels: 1

micro_wake_word:
  id: mww
  microphone: mic_duplex
  models:
    - model: okay_nabu
  on_wake_word_detected:
    - lambda: 'ESP_LOGW("wake", ">>> WAKE WORD DETECTED! <<<");'
    - script.execute: screen_wake
    - if:
        condition:
          lambda: 'return id(alarm_active);'
        then:
          - lambda: |-
              id(alarm_active) = false;
              lv_label_set_text(id(lbl_timers), "");
              ESP_LOGW("alarm", "Alarm dismissed by wake word");
        else:
          - lambda: 'lv_obj_set_tile_id(id(main_tiles), 2, 0, LV_ANIM_ON);'
          - script.execute: start_assist

voice_assistant:
  id: va
  microphone: mic_duplex
  speaker: spk_duplex
  micro_wake_word: mww
  noise_suppression_level: 2
  auto_gain: 31dBFS
  volume_multiplier: 1.0
  on_listening:
    - lambda: |-
        id(echo_state) = 1;
        ESP_LOGW("va", "Listening...");
  on_stt_vad_end:
    - lambda: 'ESP_LOGW("va", "Processing...");'
  on_stt_end:
    - lambda: 'ESP_LOGW("va", "STT: %s", x.c_str());'
  on_tts_start:
    - lambda: |-
        id(echo_state) = 2;
        ESP_LOGW("va", "TTS: %s", x.c_str());
  on_tts_end:
    - lambda: 'ESP_LOGW("va", "TTS ended");'
  on_end:
    - lambda: 'ESP_LOGW("va", "Pipeline ended");'
  on_error:
    - lambda: |-
        ESP_LOGE("va", "Error: %s", code.c_str());
        id(echo_state) = 3;
  on_timer_started:
    - lambda: 'ESP_LOGW("timer", "Timer started: %s (%ds)", timer.name.c_str(), timer.total_seconds);'
  on_timer_finished:
    - lambda: 'ESP_LOGW("timer", "Timer finished: %s", timer.name.c_str());'
    - script.execute: alarm_ring
  on_timer_cancelled:
    - lambda: |-
        ESP_LOGW("timer", "Timer cancelled: %s", timer.name.c_str());
        // Pulisci label se nessun timer attivo
        bool any_active = false;
        for (const auto &t : id(va).get_timers()) { if (t.is_active) { any_active = true; break; } }
        if (!any_active) lv_label_set_text(id(lbl_timers), "");
  on_timer_tick:
    - lambda: |-
        // timers e' const std::vector<Timer>&
        std::vector<std::pair<uint32_t, std::string>> active;
        for (const auto &t : timers) {
          if (t.is_active) {
            uint32_t mins = t.seconds_left / 60;
            uint32_t secs = t.seconds_left % 60;
            char buf[64];
            if (t.name.empty()) {
              snprintf(buf, sizeof(buf), "%02d:%02d", mins, secs);
            } else {
              snprintf(buf, sizeof(buf), "%s %02d:%02d", t.name.c_str(), mins, secs);
            }
            active.push_back({t.seconds_left, std::string(buf)});
          }
        }
        std::sort(active.begin(), active.end());
        std::string text;
        for (auto &a : active) {
          if (!text.empty()) text += "\n";
          text += a.second;
        }
        lv_label_set_text(id(lbl_timers), text.c_str());
  on_client_connected:
    - lambda: 'ESP_LOGW("va", "HA connected");'
    - micro_wake_word.start:
  on_client_disconnected:
    - lambda: 'ESP_LOGW("va", "HA disconnected");'

# --- I2C ---
i2c:
  sda: GPIO16
  scl: GPIO15
  scan: true

# --- ES8311 (per I2C access) ---
audio_dac:
  - platform: es8311
    id: es8311_codec
    address: 0x18
    bits_per_sample: 16bit
    sample_rate: 16000
    mic_gain: 24dB
    use_mclk: true
    use_microphone: true

# --- SPI ---
spi:
  clk_pin: GPIO12
  mosi_pin: GPIO11
  miso_pin: GPIO13

# --- I2S (per headers) ---
i2s_audio:
  - id: i2s_bus
    i2s_lrclk_pin: GPIO7
    i2s_bclk_pin: GPIO5
    i2s_mclk_pin: GPIO4

# --- Globals ---
globals:
  - id: echo_state
    type: int
    initial_value: "0"
  - id: i2s_tx
    type: uint32_t
    initial_value: "0"
  - id: i2s_rx
    type: uint32_t
    initial_value: "0"
  - id: echo_running
    type: bool
    initial_value: "false"
  - id: alarm_active
    type: bool
    initial_value: "false"
  - id: screen_off
    type: bool
    initial_value: "false"
  - id: last_activity
    type: uint32_t
    initial_value: "0"

# --- Time ---
time:
  - platform: sntp
    id: ha_time
    timezone: CET-1CEST,M3.5.0,M10.5.0/3
    servers:
      - it.pool.ntp.org
      - pool.ntp.org
      - time.google.com

# --- Display ---
display:
  - platform: ili9xxx
    id: my_display
    model: ili9341
    cs_pin: GPIO10
    dc_pin: GPIO46
    dimensions:
      width: 320
      height: 240
    transform:
      swap_xy: true
    invert_colors: true
    color_order: BGR
    auto_clear_enabled: false
    update_interval: never

# --- Backlight + Amplifier ---
output:
  - platform: ledc
    pin: GPIO45
    id: backlight_output
  - platform: gpio
    pin:
      number: GPIO1
      inverted: true
    id: amp_enable

light:
  - platform: monochromatic
    output: backlight_output
    name: "Display Backlight"
    id: backlight
    restore_mode: ALWAYS_ON
  - platform: esp32_rmt_led_strip
    rgb_order: GRB
    chipset: WS2812
    pin: GPIO42
    num_leds: 1
    name: "Status LED"
    id: status_led
    restore_mode: ALWAYS_ON

# --- Touchscreen ---
touchscreen:
  - platform: ft63x6
    id: my_touchscreen
    display: my_display
    interrupt_pin: GPIO17
    reset_pin: GPIO18
    transform:
      swap_xy: true
      mirror_y: true
    on_touch:
      - script.execute: screen_wake
      - lambda: |-
          if (id(alarm_active)) {
            id(alarm_active) = false;
            lv_label_set_text(id(lbl_timers), "");
            ESP_LOGW("alarm", "Alarm dismissed by touch");
          }

