# --- Scripts ---
script:
  - id: update_buttons
    then:
      - lambda: |-
          // Mappa nome icona -> codepoint unicode
          auto get_glyph = [](const std::string &name) -> std::string {
            static const std::map<std::string, uint32_t> icons = {
              {"ceiling-light", 0xF0769}, {"lamp", 0xF06B5}, {"floor-lamp", 0xF08DD},
              {"lightbulb", 0xF0335}, {"led-strip", 0xF07D6}, {"chandelier", 0xF1793},
              {"wall-sconce", 0xF091C}, {"wall-sconce-flat", 0xF091D},
              {"power-plug", 0xF06A5}, {"power-plug-outline", 0xF1425},
              {"power-socket-eu", 0xF07E7}, {"toggle-switch", 0xF0521},
              {"thermostat", 0xF0393}, {"thermometer", 0xF050F}, {"fan", 0xF0210},
              {"air-conditioner", 0xF001B}, {"radiator", 0xF0438},
              {"television", 0xF0502}, {"speaker", 0xF04C3}, {"music", 0xF075A},
              {"lock", 0xF033E}, {"door", 0xF081A}, {"window-closed", 0xF05AE},
              {"garage", 0xF06D9}, {"cctv", 0xF07AE}, {"camera", 0xF0100},
              {"motion-sensor", 0xF0D91}, {"shield-home", 0xF068A},
              {"bell", 0xF009A}, {"doorbell", 0xF12E6}, {"blinds", 0xF00AC},
              {"curtains", 0xF1846}, {"roller-shade", 0xF1A6B},
              {"window-shutter", 0xF111C}, {"robot-vacuum", 0xF070D},
              {"washing-machine", 0xF072A}, {"dishwasher", 0xF0AAC},
              {"stove", 0xF04DE}, {"coffee-maker", 0xF109F},
              {"bed", 0xF02E3}, {"sofa", 0xF04B9}, {"toilet", 0xF09AB},
              {"bathtub", 0xF1818}, {"shower", 0xF09A0}, {"desk", 0xF1239},
              {"home", 0xF02DC}, {"weather-night", 0xF0594}, {"power", 0xF0425},
              {"eye", 0xF0208}, {"alert", 0xF0026},
            };
            auto it = icons.find(name);
            if (it == icons.end()) return "\U000F0335";  // lightbulb default
            char buf[5] = {};
            uint32_t cp = it->second;
            // UTF-8 encode (3 bytes per codepoints F0000-FFFFF)
            buf[0] = 0xEF | ((cp >> 18) & 0x07);
            // Actually these are in BMP supplementary - use proper UTF-8
            if (cp <= 0x7F) {
              buf[0] = cp; buf[1] = 0;
            } else if (cp <= 0x7FF) {
              buf[0] = 0xC0 | (cp >> 6);
              buf[1] = 0x80 | (cp & 0x3F);
              buf[2] = 0;
            } else if (cp <= 0xFFFF) {
              buf[0] = 0xE0 | (cp >> 12);
              buf[1] = 0x80 | ((cp >> 6) & 0x3F);
              buf[2] = 0x80 | (cp & 0x3F);
              buf[3] = 0;
            } else {
              buf[0] = 0xF0 | (cp >> 18);
              buf[1] = 0x80 | ((cp >> 12) & 0x3F);
              buf[2] = 0x80 | ((cp >> 6) & 0x3F);
              buf[3] = 0x80 | (cp & 0x3F);
              buf[4] = 0;
            }
            return std::string(buf);
          };

          lv_label_set_text(id(lbl_btn_1), get_glyph(id(btn1_icon).state).c_str());
          lv_label_set_text(id(lbl_btn_2), get_glyph(id(btn2_icon).state).c_str());
          lv_label_set_text(id(lbl_btn_3), get_glyph(id(btn3_icon).state).c_str());
          lv_label_set_text(id(lbl_btn_4), get_glyph(id(btn4_icon).state).c_str());

  - id: screen_wake
    then:
      - lambda: |-
          id(last_activity) = millis();
          if (id(screen_off)) {
            id(screen_off) = false;
            auto call = id(backlight).turn_on();
            call.set_brightness(0.8f);
            call.perform();
          }

  - id: alarm_ring
    then:
      - script.execute: screen_wake
      - lambda: |-
          // Vai alla pagina orologio
          lv_obj_set_tile_id(id(main_tiles), 0, 0, LV_ANIM_ON);
          id(alarm_active) = true;
          xTaskCreatePinnedToCore([](void *param) {
            // Genera un beep da 400ms
            const int n = 16000 * 400 / 1000;
            int16_t *beep = (int16_t *)heap_caps_malloc(n * 2, MALLOC_CAP_DEFAULT);
            if (beep) {
              for (int i = 0; i < n; i++)
                beep[i] = (int16_t)(16000.0f * sinf(2.0f * M_PI * 880.0f * i / 16000.0f));
              // Loop finche' alarm_active
              while (id(alarm_active)) {
                id(spk_duplex).play((uint8_t*)beep, n * 2);
                vTaskDelay(pdMS_TO_TICKS(2000));
              }
              free(beep);
            }
            id(spk_duplex).stop();
            ESP_LOGW("alarm", "Alarm stopped");
            vTaskDelete(NULL);
          }, "alarm_task", 4096, NULL, 5, NULL, 0);

  - id: alarm_stop
    then:
      - lambda: |-
          id(alarm_active) = false;
          ESP_LOGW("alarm", "Alarm dismissed");

  - id: start_assist
    then:
      - if:
          condition:
            voice_assistant.is_running:
          then:
            - voice_assistant.stop:
            - lambda: |-
                id(echo_state) = 3;
                ESP_LOGW("va", "Pipeline interrupted by user");
          else:
            - micro_wake_word.stop:
            - delay: 300ms
            - lambda: 'id(va).set_use_wake_word(false);'
            - voice_assistant.start:

# --- LVGL ---
lvgl:
  displays:
    - my_display
  touchscreens:
    - my_touchscreen
  color_depth: 16
  buffer_size: 25%
  disp_bg_color: 0x000000
  disp_bg_opa: COVER
  default_font: font_body

  style_definitions:
    - id: style_card
      bg_color: 0x1C1C1C
      bg_opa: COVER
      radius: 12
      pad_all: 10
      border_width: 1
      border_color: 0x292929
      border_opa: COVER
    - id: style_btn_off
      bg_color: 0x1C1C1C
      bg_opa: COVER
      radius: 12
      border_width: 1
      border_color: 0x292929
      border_opa: COVER
      text_color: 0x9B9B9B

  widgets:
    - tileview:
        id: main_tiles
        width: 320
        height: 240
        bg_color: 0x000000
        bg_opa: COVER
        tiles:
          # ==========================================
          # TILE 0: OROLOGIO
          # ==========================================
          - id: tile_clock
            row: 0
            column: 0
            dir: HOR
            widgets:
              - obj:
                  align: CENTER
                  width: 290
                  height: 210
                  styles: style_card
                  layout:
