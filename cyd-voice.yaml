# --- Intervals ---
interval:
  - interval: 1s
    then:
      - lvgl.label.update:
          id: lbl_clock
          text: !lambda |-
            if (id(ha_time).now().is_valid()) {
              return id(ha_time).now().strftime("%H:%M");
            }
            return std::string("--:--");
      - lvgl.label.update:
          id: lbl_date
          text: !lambda |-
            if (!id(ha_time).now().is_valid()) return std::string("...");
            static const char* giorni[] = {"Domenica","Lunedi","Martedi","Mercoledi","Giovedi","Venerdi","Sabato"};
            static const char* mesi[] = {"Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"};
            auto now = id(ha_time).now();
            char buf[40];
            snprintf(buf, sizeof(buf), "%s %d %s", giorni[now.day_of_week-1], now.day_of_month, mesi[now.month-1]);
            return std::string(buf);
      # Auto-ritorno a orologio + auto-spegnimento display
      - lambda: |-
          uint32_t elapsed = millis() - id(last_activity);
          bool busy = id(echo_state) == 1 || id(echo_state) == 2 || id(alarm_active);

          // Ritorno a pagina orologio
          uint32_t clock_timeout = (uint32_t)id(clock_return_timeout).state;
          if (clock_timeout > 0 && !busy && !id(screen_off)) {
            if (elapsed > clock_timeout * 1000) {
              lv_obj_set_tile_id(id(main_tiles), 0, 0, LV_ANIM_ON);
            }
          }

          // Spegnimento display
          uint32_t disp_timeout = (uint32_t)id(display_timeout).state;
          if (disp_timeout > 0 && !id(screen_off) && !busy) {
            if (elapsed > disp_timeout * 1000) {
              id(screen_off) = true;
              auto call = id(backlight).turn_off();
              call.perform();
            }
          }

  - interval: 200ms
    then:
      - lambda: |-
          static int last_state = -1;
          int state = id(echo_state);

          // Se stato=2 (risposta) ma speaker fermo -> passa a done
          if (state == 2 && !id(spk_duplex).is_running()) {
            id(echo_state) = 3;
            state = 3;
          }

          // Stato UI voice page
          if (state != last_state) {
            last_state = state;
            if (state == 0) {
              lv_obj_set_style_bg_color(id(voice_circle), lv_color_hex(0x0B56FC), 0);
              lv_label_set_text(id(lbl_va_status), "DI' \"OKAY, NABU\"");
              lv_obj_set_style_text_color(id(lbl_va_status), lv_color_hex(0x0B56FC), 0);
              lv_label_set_text(id(lbl_va_text), "");
            } else if (state == 1) {
              lv_obj_set_style_bg_color(id(voice_circle), lv_color_hex(0xFF0000), 0);
              lv_label_set_text(id(lbl_va_status), "ASCOLTO...");
              lv_obj_set_style_text_color(id(lbl_va_status), lv_color_hex(0xFF0000), 0);
            } else if (state == 2) {
              lv_obj_set_style_bg_color(id(voice_circle), lv_color_hex(0x00CC00), 0);
              lv_label_set_text(id(lbl_va_status), "RISPOSTA...");
              lv_obj_set_style_text_color(id(lbl_va_status), lv_color_hex(0x00CC00), 0);
            } else if (state == 3) {
              lv_obj_set_style_bg_color(id(voice_circle), lv_color_hex(0x0B56FC), 0);
              lv_label_set_text(id(lbl_va_status), "DI' \"OKAY, NABU\"");
              lv_obj_set_style_text_color(id(lbl_va_status), lv_color_hex(0x0B56FC), 0);
              id(echo_state) = 0;
              last_state = 0;
            }
          }

          // Auto-restart wake word
          static uint32_t done_time = 0;
          if (state == 3 || state == 0) {
            if (!id(mww).is_running() && !id(spk_duplex).is_running()) {
              if (done_time == 0) {
                done_time = millis();
              } else if ((millis() - done_time) > 1500) {
                done_time = 0;
                if (!id(mic_duplex).is_running()) {
                  id(mic_duplex).start();
                }
                id(mww).start();
              }
            } else {
              done_time = 0;
            }
          } else {
            done_time = 0;
          }

