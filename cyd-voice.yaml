                    - label:
                        id: lbl_clock
                        text: "--:--"
                        text_font: font_clock
                        text_color: 0xFFFFFF
                    - label:
                        id: lbl_date
                        text: "..."
                        text_font: font_date
                        text_color: 0x9B9B9B
                    - obj:
                        width: 240
                        height: 1
                        bg_color: 0x292929
                        bg_opa: COVER
                        border_width: 0
