    password: "fallback123"

captive_portal:

# --- Custom components ---
external_components:
  - source:
      type: local
      path: custom_components
    components: [duplex_mic, duplex_speaker]

microphone:
  - platform: duplex_mic
    id: mic_duplex
    sample_rate: 16000
    bits_per_sample: 16
    num_channels: 1

speaker:
  - platform: duplex_speaker
    id: spk_duplex
    sample_rate: 16000
    bits_per_sample: 16
    num_channels: 1

micro_wake_word:
  id: mww
  microphone: mic_duplex
  models:
    - model: okay_nabu
  on_wake_word_detected:
    - lambda: 'ESP_LOGW("wake", ">>> WAKE WORD DETECTED! <<<");'
    - script.execute: screen_wake
    - if:
        condition:
          lambda: 'return id(alarm_active);'
        then:
          - lambda: |-
              id(alarm_active) = false;
              lv_label_set_text(id(lbl_timers), "");
              ESP_LOGW("alarm", "Alarm dismissed by wake word");
        else:
          - lambda: 'lv_obj_set_tile_id(id(main_tiles), 2, 0, LV_ANIM_ON);'
          - script.execute: start_assist

voice_assistant:
  id: va
  microphone: mic_duplex
  speaker: spk_duplex
  micro_wake_word: mww
  noise_suppression_level: 2
  auto_gain: 31dBFS
  volume_multiplier: 1.0
  on_listening:
    - lambda: |-
        id(echo_state) = 1;
        ESP_LOGW("va", "Listening...");
  on_stt_vad_end:
    - lambda: 'ESP_LOGW("va", "Processing...");'
  on_stt_end:
    - lambda: 'ESP_LOGW("va", "STT: %s", x.c_str());'
  on_tts_start:
    - lambda: |-
        id(echo_state) = 2;
        ESP_LOGW("va", "TTS: %s", x.c_str());
  on_tts_end:
    - lambda: 'ESP_LOGW("va", "TTS ended");'
  on_end:
    - lambda: 'ESP_LOGW("va", "Pipeline ended");'
  on_error:
    - lambda: |-
        ESP_LOGE("va", "Error: %s", code.c_str());
        id(echo_state) = 3;
  on_timer_started:
    - lambda: 'ESP_LOGW("timer", "Timer started: %s (%ds)", timer.name.c_str(), timer.total_seconds);'
  on_timer_finished:
    - lambda: 'ESP_LOGW("timer", "Timer finished: %s", timer.name.c_str());'
    - script.execute: alarm_ring
  on_timer_cancelled:
    - lambda: |-
        ESP_LOGW("timer", "Timer cancelled: %s", timer.name.c_str());
        // Pulisci label se nessun timer attivo
        bool any_active = false;
        for (const auto &t : id(va).get_timers()) { if (t.is_active) { any_active = true; break; } }
        if (!any_active) lv_label_set_text(id(lbl_timers), "");
  on_timer_tick:
    - lambda: |-
        // timers e' const std::vector<Timer>&
        std::vector<std::pair<uint32_t, std::string>> active;
        for (const auto &t : timers) {
          if (t.is_active) {
            uint32_t mins = t.seconds_left / 60;
            uint32_t secs = t.seconds_left % 60;
            char buf[64];
            if (t.name.empty()) {
              snprintf(buf, sizeof(buf), "%02d:%02d", mins, secs);
            } else {
              snprintf(buf, sizeof(buf), "%s %02d:%02d", t.name.c_str(), mins, secs);
            }
            active.push_back({t.seconds_left, std::string(buf)});
          }
        }
        std::sort(active.begin(), active.end());
        std::string text;
        for (auto &a : active) {
          if (!text.empty()) text += "\n";
          text += a.second;
        }
        lv_label_set_text(id(lbl_timers), text.c_str());
  on_client_connected:
    - lambda: 'ESP_LOGW("va", "HA connected");'
    - micro_wake_word.start:
  on_client_disconnected:
    - lambda: 'ESP_LOGW("va", "HA disconnected");'

# --- I2C ---
i2c:
  sda: GPIO16
  scl: GPIO15
  scan: true

# --- ES8311 (per I2C access) ---
audio_dac:
  - platform: es8311
    id: es8311_codec
    address: 0x18
    bits_per_sample: 16bit
    sample_rate: 16000
    mic_gain: 24dB
    use_mclk: true
    use_microphone: true

# --- SPI ---
spi:
  clk_pin: GPIO12
  mosi_pin: GPIO11
  miso_pin: GPIO13

# --- I2S (per headers) ---
i2s_audio:
  - id: i2s_bus
    i2s_lrclk_pin: GPIO7
    i2s_bclk_pin: GPIO5
    i2s_mclk_pin: GPIO4

# --- Globals ---
globals:
  - id: echo_state
    type: int
    initial_value: "0"
  - id: i2s_tx
    type: uint32_t
    initial_value: "0"
  - id: i2s_rx
    type: uint32_t
    initial_value: "0"
  - id: echo_running
    type: bool
    initial_value: "false"
  - id: alarm_active
    type: bool
    initial_value: "false"
  - id: screen_off
    type: bool
    initial_value: "false"
  - id: last_activity
    type: uint32_t
    initial_value: "0"

# --- Time ---
time:
  - platform: sntp
    id: ha_time
    timezone: CET-1CEST,M3.5.0,M10.5.0/3
    servers:
      - it.pool.ntp.org
      - pool.ntp.org
      - time.google.com

# --- Display ---
display:
  - platform: ili9xxx
    id: my_display
    model: ili9341
    cs_pin: GPIO10
    dc_pin: GPIO46
    dimensions:
      width: 320
      height: 240
    transform:
      swap_xy: true
    invert_colors: true
    color_order: BGR
    auto_clear_enabled: false
    update_interval: never

# --- Backlight + Amplifier ---
output:
  - platform: ledc
    pin: GPIO45
    id: backlight_output
  - platform: gpio
    pin:
      number: GPIO1
      inverted: true
    id: amp_enable

light:
  - platform: monochromatic
    output: backlight_output
    name: "Display Backlight"
    id: backlight
    restore_mode: ALWAYS_ON
  - platform: esp32_rmt_led_strip
    rgb_order: GRB
    chipset: WS2812
    pin: GPIO42
    num_leds: 1
    name: "Status LED"
    id: status_led
    restore_mode: ALWAYS_ON

# --- Touchscreen ---
touchscreen:
  - platform: ft63x6
    id: my_touchscreen
    display: my_display
    interrupt_pin: GPIO17
    reset_pin: GPIO18
    transform:
      swap_xy: true
      mirror_y: true
    on_touch:
      - script.execute: screen_wake
      - lambda: |-
          if (id(alarm_active)) {
            id(alarm_active) = false;
            lv_label_set_text(id(lbl_timers), "");
            ESP_LOGW("alarm", "Alarm dismissed by touch");
          }

# --- Fonts ---
font:
  - file: "gfonts://Roboto@500"
    id: font_clock
    size: 64
    bpp: 4
  - file: "gfonts://Roboto@500"
    id: font_title
    size: 22
    bpp: 4
  - file: "gfonts://Roboto"
    id: font_body
    size: 16
    bpp: 4
  - file: "gfonts://Roboto@300"
    id: font_date
    size: 16
    bpp: 4
  - file: "gfonts://Roboto"
    id: font_small
    size: 13
    bpp: 4
  - file: "https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/fonts/materialdesignicons-webfont.ttf"
    id: font_icons
    size: 36
    bpp: 4
    glyphs:
      - "\U000F0769"  # mdi:ceiling-light
      - "\U000F08DD"  # mdi:floor-lamp
      - "\U000F09AB"  # mdi:toilet
      - "\U000F0594"  # mdi:weather-night
      - "\U000F06A9"  # mdi:robot

# --- Scripts ---
script:
  - id: screen_wake
    then:
      - lambda: |-
          id(last_activity) = millis();
          if (id(screen_off)) {
            id(screen_off) = false;
            auto call = id(backlight).turn_on();
            call.set_brightness(0.8f);
            call.perform();
          }

  - id: alarm_ring
    then:
      - script.execute: screen_wake
      - lambda: |-
          // Vai alla pagina orologio
          lv_obj_set_tile_id(id(main_tiles), 0, 0, LV_ANIM_ON);
          id(alarm_active) = true;
          xTaskCreatePinnedToCore([](void *param) {
            // Genera un beep da 400ms
            const int n = 16000 * 400 / 1000;
            int16_t *beep = (int16_t *)heap_caps_malloc(n * 2, MALLOC_CAP_DEFAULT);
            if (beep) {
              for (int i = 0; i < n; i++)
                beep[i] = (int16_t)(16000.0f * sinf(2.0f * M_PI * 880.0f * i / 16000.0f));
              // Loop finche' alarm_active
              while (id(alarm_active)) {
                id(spk_duplex).play((uint8_t*)beep, n * 2);
                vTaskDelay(pdMS_TO_TICKS(2000));
              }
              free(beep);
            }
            id(spk_duplex).stop();
            ESP_LOGW("alarm", "Alarm stopped");
            vTaskDelete(NULL);
          }, "alarm_task", 4096, NULL, 5, NULL, 0);

  - id: alarm_stop
    then:
      - lambda: |-
          id(alarm_active) = false;
          ESP_LOGW("alarm", "Alarm dismissed");

  - id: tone_test
    then:
      - lambda: |-
          const int n = 16000 / 2;  // 0.5 secondi
          std::vector<uint8_t> tone(n * 2);
          for (int i = 0; i < n; i++) {
            int16_t s = (int16_t)(16000.0f * sinf(2.0f * M_PI * 440.0f * i / 16000.0f));
            tone[i*2] = s & 0xFF;
            tone[i*2+1] = (s >> 8) & 0xFF;
          }
          id(spk_duplex).play(tone.data(), tone.size());

  - id: vol_up
    then:
      - lambda: |-
          float v = id(volume_ctrl).state + 1;
          if (v > 100) v = 100;
          auto call = id(volume_ctrl).make_call();
          call.set_value(v);
          call.perform();

  - id: vol_down
    then:
      - lambda: |-
          float v = id(volume_ctrl).state - 1;
          if (v < 0) v = 0;
          auto call = id(volume_ctrl).make_call();
          call.set_value(v);
          call.perform();

  - id: start_assist
    then:
      - if:
          condition:
            voice_assistant.is_running:
          then:
            - voice_assistant.stop:
            - lambda: |-
                id(echo_state) = 3;
                ESP_LOGW("va", "Pipeline interrupted by user");
          else:
            - micro_wake_word.stop:
            - delay: 300ms
            - lambda: 'id(va).set_use_wake_word(false);'
            - voice_assistant.start:

# --- LVGL ---
lvgl:
  displays:
    - my_display
  touchscreens:
    - my_touchscreen
  color_depth: 16
  buffer_size: 25%
  disp_bg_color: 0x000000
  disp_bg_opa: COVER
  default_font: font_body

  style_definitions:
    - id: style_card
      bg_color: 0x1C1C1C
      bg_opa: COVER
      radius: 12
      pad_all: 10
      border_width: 1
      border_color: 0x292929
      border_opa: COVER
    - id: style_btn_off
      bg_color: 0x1C1C1C
      bg_opa: COVER
      radius: 12
      border_width: 1
      border_color: 0x292929
      border_opa: COVER
      text_color: 0x9B9B9B

  widgets:
    - tileview:
        id: main_tiles
        width: 320
        height: 240
        bg_color: 0x000000
        bg_opa: COVER
        tiles:
          # ==========================================
          # TILE 0: OROLOGIO
          # ==========================================
          - id: tile_clock
            row: 0
            column: 0
            dir: HOR
            widgets:
              - obj:
                  align: CENTER
                  width: 290
                  height: 210
